# Backend settings
backend = "glx";  # Use GLX as the experimental backend for better performance

# Enable animations
fade-in-step = 0.05;  # Smooth fade-in
fade-out-step = 0.05;  # Smooth fade-out
fading = true;  # Enable fading effect
fade-delta = 10;  # Increase fading speed for smoother transitions

# Blur settings (Important)
blur-method = "dual_kawase";  # Dual Kawase blur method for better effect
blur-strength = 8;  # Set strength of blur effect (adjust as needed)

# Enable background blur
blur-background = true;  # Enable background blur (important for the blur effect)
blur-background-frame = true;  # Enable blur effect on window frames

# Transparency settings for active/inactive windows
inactive-opacity = 0.70;  # Transparency for inactive windows
active-opacity = 0.90;  # Slightly more opaque for active windows

# Window-specific opacity (optional)
opacity-rule = [
  "90:class_g = 'i3bar'",  # Example for i3bar transparency
  "80:class_g = 'URxvt'"   # Example for terminal transparency
];

# Enable shadow (optional)
shadow = true;  # Enable shadows
shadow-radius = 12;  # Shadow radius
shadow-offset-x = -10;  # X offset for shadow
shadow-offset-y = -10;  # Y offset for shadow

# Enable smooth moving and resizing
frame-opacity = 1.0;  # Fully opaque frames
move-opacity = 0.8;  # Slight transparency when moving windows
resize-opacity = 0.85;  # Slight transparency while resizing

# Vsync for smoother rendering
vsync = true;  # Enable vsync for smoother animations and reduce tearing

# Enable window effects for opening/closing
window-dragging = true;  # Smooth dragging of windows
window-moving = true;  # Smooth movement of windows

# General settings
menu-opacity = 0.9;  # Transparency of menus
wintypes:
{
  tooltip = { opacity = 0.85; };  # Set opacity for tooltips
}

corner-radius = 8;  # Set corner radius to 8 pixels

rounded-corners-exclude = [
    "class_g = 'i3bar'"  # Exclude i3bar from rounded corners
];

